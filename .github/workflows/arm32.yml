name: Build Docker Image and Export Tar

on:
  workflow_dispatch:
    inputs:
      images:
        description: 'Docker images to build (comma-separated)'
        required: true
        default: 'aapanel/aapanel:latest,casaos/casaos:latest'
        type: string
      platform:
        description: 'Target platform'
        required: true
        default: 'linux/arm/v7'
        type: choice
        options:
          - linux/amd64
          - linux/arm64
          - linux/arm/v7

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # 保持 v4 稳定，警告可忽略

      - name: Set up QEMU for multi-arch
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Pull and save Docker image
        run: |
          mkdir -p output
          IFS=',' read -ra IMAGES <<< "${{ github.event.inputs.images }}"
          for image in "${IMAGES[@]}"; do
            # 去除可能的空格
            image=$(echo $image | xargs)
            echo "::group::Processing $image for ${{ github.event.inputs.platform }}"
            echo "Pulling $image"
            docker pull --platform ${{ github.event.inputs.platform }} $image
            echo "Saving $image to tar file"
            # 生成安全的文件名
            safe_name=$(echo $image | tr '/' '_' | tr ':' '_')
            docker save $image -o output/${safe_name}.tar
            echo "::endgroup::"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docker-images-${{ github.event.inputs.platform }}
          path: output/*.tar
